<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="main.css">
    <title>Frontend Mentor | Product preview card component</title>
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png"/>
  </head>

  <body>
    <main>
      <article>
        <div class="product-img">
          <img class="image" src="images/image-product-desktop.jpg" alt="Gabrielle Essence Eau De Parfum perfume bottle with green leaves" />
        </div>
        <section class="section">
          <div class="product-infos">
            <p class="product-type">Perfume</p>

            <h1 class="product-name">Gabrielle Essence Eau De Parfum</h1>

            <p class="product-subtitle">
              A floral, solar and voluptuous interpretation composed by Olivier
              Polge, Perfumer-Creator for the House of CHANEL.
            </p>
          </div>

          <p class="product-price"> $149.99 <span class="product-ex-price">$169.99</span></p>

          <button class="product-button">
            <img src="images/icon-cart.svg" alt="" aria-hidden="true">
            Add to Cart
          </button>
        </section>
      </article>
    </main>

    <footer class="attribution">Challenge by <a href="https://www.frontendmentor.io?ref=challenge"> Frontend Mentor</a>.Coded by <a href="https://github.com/Ismail-SWE">Ismailov K</a>.</footer>
  </body>
</html>
